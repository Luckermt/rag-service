version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_API_KEY=5e15b40f78e247e59b7e8bbf94aa4ab1.Kgaz6TC3esrOOtAVQaEU_iAz
      - SPRING_AI_OLLAMA_API_KEY=5e15b40f78e247e59b7e8bbf94aa4ab1.Kgaz6TC3esrOOtAVQaEU_iAz
      - SPRING_AI_VECTORSTORE_QDRANT_HOST=qdrant
      - SPRING_AI_VECTORSTORE_QDRANT_API_KEY=${QDRANT_API_KEY:-rag-secret-key}
      - RAG_WEB_SEARCH_SEARXNG_URL=http://searxng:8080
    depends_on:
      - qdrant
      - searxng
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

    environment:
      # Переменная вложенная; значение '1' явно включает проверку API-ключа
      - QDRANT__SERVICE__ENABLE_API_KEY=1
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-rag-secret-key}

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - INSTANCE_NAME=rag-searxng
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://app:8080/v1
      - OPENAI_API_KEY=any-key
    depends_on:
      - app
    restart: unless-stopped

volumes:
  qdrant_data: