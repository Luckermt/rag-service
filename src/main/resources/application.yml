server:
  port: 8080

spring:
  ai:
    ollama:
      base-url: http://host.docker.internal:11434
      api-key: ${OLLAMA_API_KEY}
      chat:
        options:
          model: minimax-m2.5:cloud
        api-key: ${OLLAMA_API_KEY}
      embedding:
        options:
          model: nomic-embed-text:v1.5
        api-key: ${OLLAMA_API_KEY}
    vectorstore:
      qdrant:
        host: qdrant
        port: 6334          # gRPC
        api-key: ${QDRANT_API_KEY}
        collection-name: rag_chunks
        use-tls: false
        initialize-schema: true
  datasource:
    url: jdbc:h2:mem:rag_docs
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  

rag:
  chunk:
    size: 1000
    overlap: 200
  retrieval:
    top-k: 5
    similarity-threshold: 0.0
    strong-threshold: 0.0
    min-total-score: 0.0
  documents:
    max-file-size: 52428800   # 50 MB
  web-search:
    enabled: true
    searxng-url: http://searxng:8080
  dialog:
    max-history-messages: 20
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n"

webclient:
  connect-timeout: 5000      # 5 сек
  read-timeout: 30000        # 30 сек

# Resilience4j
resilience4j:
  retry:
    instances:
      qdrantRetry:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - io.grpc.StatusRuntimeException
        ignoreExceptions:
          - org.springframework.dao.DataIntegrityViolationException
      ollamaRetry:
        maxAttempts: 3
        waitDuration: 2s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      webSearchRetry:
        maxAttempts: 2
        waitDuration: 1s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException

  circuitbreaker:
    instances:
      ollamaCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.rag.rag_service.exception.QuotaExceededException

  timelimiter:
    instances:
      ollamaTL:
        timeoutDuration: 60s
      qdrantTL:
        timeoutDuration: 30s
      webSearchTL:
        timeoutDuration: 10s
  